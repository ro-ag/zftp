name: CI

on:
  push:
    branches: [main, v2-modernization]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"

# Least-privilege by default.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.21", "stable"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      # Build and vet prove the library is pure Go (no cgo in source).
      - name: build (CGO disabled)
        run: go build ./...
        env:
          CGO_ENABLED: "0"
      - name: vet (CGO disabled)
        run: go vet ./...
        env:
          CGO_ENABLED: "0"
      # The race detector requires cgo; the runners ship a C compiler. This links
      # the race runtime only and does not introduce cgo into library source.
      - name: test -race (CGO enabled)
        run: go test -race ./...
        env:
          CGO_ENABLED: "1"

  lint:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  cli:
    name: cli build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
      # The CLI is a separate module; build it on its own.
      - name: build cli module
        run: cd cli && go build ./...
        env:
          CGO_ENABLED: "0"
      # Guard the zero-dependency promise of the library module: `go list -m all`
      # lists the main module plus every dependency, so a dependency-free module
      # yields exactly one line.
      - name: library has no external dependencies
        run: |
          n="$(go list -m all | wc -l | tr -d ' ')"
          if [ "$n" != "1" ]; then
            echo "library gained external dependencies:"
            go list -m all
            exit 1
          fi
          echo "library module is dependency-free"

  # Single required status check that aggregates every other job.
  ci-success:
    name: CI Success
    if: always()
    needs: [test, lint, govulncheck, cli]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.govulncheck.result }}" != "success" ] || \
             [ "${{ needs.cli.result }}" != "success" ]; then
            echo "one or more CI jobs failed"
            exit 1
          fi
          echo "all CI jobs passed"
