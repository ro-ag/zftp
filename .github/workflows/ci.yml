name: CI

on:
  push:
    branches: [main, v2-modernization]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"

# Least-privilege by default.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.20", "stable"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      # Build and vet prove the library is pure Go (no cgo in source).
      - name: build (CGO disabled)
        run: go build ./...
        env:
          CGO_ENABLED: "0"
      - name: vet (CGO disabled)
        run: go vet ./...
        env:
          CGO_ENABLED: "0"
      # The race detector requires cgo; the runners ship a C compiler. This links
      # the race runtime only and does not introduce cgo into library source.
      - name: test -race (CGO enabled)
        run: go test -race ./...
        env:
          CGO_ENABLED: "1"

  lint:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
          check-latest: true
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
          check-latest: true
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # Single required status check that aggregates the matrix and lint jobs.
  ci-success:
    name: CI Success
    if: always()
    needs: [test, lint, govulncheck]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.govulncheck.result }}" != "success" ]; then
            echo "one or more CI jobs failed"
            exit 1
          fi
          echo "all CI jobs passed"
